<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You – Phoolpur Multispeciality Hospital</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy:#0a1628;
  --teal:#0e7490;
  --teal2:#0891b2;
  --gold:#f5c842;
  --white:#ffffff;
  --muted:#64748b;
}

body{
  margin:0;
  font-family:'Outfit',sans-serif;
  background:linear-gradient(135deg,#0a1628 0%,#0e7490 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

.card{
  background:white;
  padding:50px 40px;
  border-radius:20px;
  max-width:500px;
  width:90%;
  text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  animation:fadeUp .6s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

.icon{
  width:80px;
  height:80px;
  background:linear-gradient(135deg,#dcfce7,#bbf7d0);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:2.5rem;
  margin:0 auto 20px;
}

h1{
  font-family:'Cormorant Garamond',serif;
  font-size:2rem;
  color:var(--navy);
  margin-bottom:10px;
}

p{
  color:var(--muted);
  font-size:.95rem;
  line-height:1.6;
  margin-bottom:25px;
}

.ref{
  background:#e0f2fe;
  color:var(--teal);
  padding:8px 18px;
  border-radius:50px;
  display:inline-block;
  font-weight:600;
  margin-bottom:25px;
}

.btn{
  display:inline-block;
  text-decoration:none;
  background:linear-gradient(135deg,var(--teal2),var(--teal));
  color:white;
  padding:12px 28px;
  border-radius:10px;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  opacity:0.9;
  transform:translateY(-2px);
}

.small{
  margin-top:20px;
  font-size:.8rem;
  color:#94a3b8;
}

</style>
</head>

<body>

<div class="card">
  <div class="icon">✅</div>
  <h1>Appointment Confirmed!</h1>
  <p>Thank you for booking your appointment with <strong>Phoolpur Multispeciality Hospital</strong>.<br>
  Our team will contact you shortly to confirm your schedule.</p>

  <div class="ref">Please check your email for details</div>

  <a href="index.html" class="btn">⬅ Back to Home</a>

  <div class="small">
    📍 Phoolpur, Azamgarh (U.P.)<br>
    📞 +91 9219035039
  </div>
</div>

</body>
</html>
